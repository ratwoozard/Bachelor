<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>{{ title }} – Bachelor Support Solutions</title>
  <style>
    @page {
      size: A4;
      margin: 2cm;
      @bottom-center {
        font-family: 'Georgia', serif;
        font-size: 9pt;
        color: #555;
        content: "Kapitel 1 – Introduktion | " counter(page) " / " counter(pages);
      }
    }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #222;
      max-width: 16cm;
      margin: 0 auto;
      padding: 0.5cm 0;
    }
    h1 {
      font-size: 18pt;
      font-weight: 700;
      color: #1a365d;
      border-bottom: 2px solid #2b6cb0;
      padding-bottom: 0.3em;
      margin: 0 0 0.6em 0;
      page-break-after: avoid;
    }
    h2 {
      font-size: 13pt;
      font-weight: 600;
      color: #2c5282;
      margin: 1.2em 0 0.5em 0;
      page-break-after: avoid;
    }
    p {
      margin: 0 0 0.65em 0;
      text-align: justify;
    }
    .intro {
      font-size: 10.5pt;
      color: #4a5568;
      margin-bottom: 1em;
    }
    blockquote {
      margin: 0.8em 0;
      padding: 0.5em 1em;
      border-left: 4px solid #2b6cb0;
      background: #f7fafc;
      font-style: italic;
      color: #2d3748;
    }
    strong { font-weight: 600; color: #1a202c; }
    code { font-family: 'Consolas', monospace; background: #edf2f7; padding: 0.1em 0.3em; font-size: 0.95em; }
    ul { margin: 0.4em 0; padding-left: 1.4em; }
    li { margin: 0.2em 0; }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.2em 0; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  {% for p in intro_paragraphs %}
  <p class="intro">{{ p | safe }}</p>
  {% endfor %}

  {% for section in sections %}
  <h2>{{ section.heading }}</h2>
  {% for p in section.paragraphs_html %}
  <p>{{ p | safe }}</p>
  {% endfor %}
  {% endfor %}
</body>
</html>
