<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="720" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Research design: AI-baseret automatisering i bemandingsprocessen</title>
  <desc id="desc">Vertikalt research design-diagram struktureret i fire vidensniveauer: ontologisk, epistemologisk, metodologisk og metode/teknisk niveau, afsluttet med kvalitetskriterier og bias-refleksion.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .frame { fill: none; stroke: #333; stroke-width: 1.5; }
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 1.2; }
      .boxW { fill: #ffffff; stroke: #333; stroke-width: 1.0; }
      .arrow { stroke: #333; stroke-width: 1.2; fill: none; marker-end: url(#ah); }
      .t { font-family: "Times New Roman", Georgia, serif; fill: #1a1a1a; }
      .title { font-size: 16px; font-weight: bold; }
      .subtitle { font-size: 12px; font-style: italic; fill: #333; }
      .levellabel { font-size: 11px; font-weight: bold; fill: #555; letter-spacing: 0.5px; }
      .h { font-size: 13px; font-weight: bold; }
      .s { font-size: 11px; }
      .si { font-size: 11px; font-style: italic; fill: #555; }
      .sep { stroke: #bbb; stroke-width: 0.8; stroke-dasharray: 4,4; }
      .cap { font-size: 10px; fill: #555; font-style: italic; }
    ]]></style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <rect class="frame" x="10" y="10" width="700" height="880" rx="4" ry="4"/>

  <!-- Header -->
  <text class="t title" x="30" y="38">Research design</text>
  <text class="t subtitle" x="30" y="56">AI-baseret automatisering i bemandingsprocessen for indstilling af konsulenter</text>
  <line class="sep" x1="20" y1="70" x2="700" y2="70"/>

  <!-- ===================== Niveau 1 ===================== -->
  <text class="t levellabel" x="30" y="88">NIVEAU 1 — ONTOLOGISK STÅSTED</text>
  <rect class="box" x="210" y="98" width="300" height="78" rx="4" ry="4"/>
  <text class="t h" x="360" y="118" text-anchor="middle">Pragmatisk ontologi</text>
  <text class="t s" x="360" y="136" text-anchor="middle">Genstandsfelt: observerbar proces +</text>
  <text class="t s" x="360" y="150" text-anchor="middle">organisatorisk praksis</text>
  <text class="t si" x="360" y="168" text-anchor="middle">Kuada (2012); Holm (2023); Saunders et al. (2023)</text>

  <line class="sep" x1="20" y1="185" x2="700" y2="185"/>

  <!-- ===================== Niveau 2 ===================== -->
  <text class="t levellabel" x="30" y="203">NIVEAU 2 — EPISTEMOLOGISK STÅSTED</text>

  <!-- Arrow from N1 splitting into two tracks -->
  <line class="arrow" x1="200" y1="215" x2="200" y2="230"/>
  <line class="arrow" x1="520" y1="215" x2="520" y2="230"/>
  <line class="sep" x1="200" y1="215" x2="520" y2="215"/>
  <line class="sep" x1="360" y1="180" x2="360" y2="215"/>

  <rect class="boxW" x="60" y="230" width="280" height="72" rx="4" ry="4"/>
  <text class="t h" x="200" y="250" text-anchor="middle">Fortolkende epistemologi</text>
  <text class="t s" x="200" y="268" text-anchor="middle">Interpretivisme + moderne hermeneutik</text>
  <text class="t si" x="200" y="288" text-anchor="middle">Holm (2023); Saunders et al. (2023)</text>

  <rect class="boxW" x="380" y="230" width="280" height="72" rx="4" ry="4"/>
  <text class="t h" x="520" y="250" text-anchor="middle">Kvantitativt målespor</text>
  <text class="t s" x="520" y="268" text-anchor="middle">under pragmatisk ramme</text>
  <text class="t si" x="520" y="288" text-anchor="middle">Kuada (2012); Saunders et al. (2023)</text>

  <line class="sep" x1="20" y1="318" x2="700" y2="318"/>

  <!-- ===================== Niveau 3 ===================== -->
  <text class="t levellabel" x="30" y="336">NIVEAU 3 — METODOLOGISK RAMME</text>

  <!-- Arrows from N2 tracks down to N3 -->
  <line class="arrow" x1="200" y1="302" x2="200" y2="350"/>
  <line class="arrow" x1="520" y1="302" x2="520" y2="350"/>

  <!-- Row 1: Strategi / Abduktion / Design -->
  <rect class="box" x="40" y="352" width="200" height="60" rx="4" ry="4"/>
  <text class="t h" x="140" y="371" text-anchor="middle">Pragmatisk strategi</text>
  <text class="t s" x="140" y="388" text-anchor="middle">Mixed methods</text>
  <text class="t si" x="140" y="403" text-anchor="middle">Rossman &amp; Wilson (1985)</text>

  <rect class="box" x="260" y="352" width="200" height="60" rx="4" ry="4"/>
  <text class="t h" x="360" y="371" text-anchor="middle">Abduktion</text>
  <text class="t s" x="360" y="388" text-anchor="middle">Vekselvirkning teori ↔ empiri</text>
  <text class="t si" x="360" y="403" text-anchor="middle">Holm (2023)</text>

  <rect class="box" x="480" y="352" width="200" height="60" rx="4" ry="4"/>
  <text class="t h" x="580" y="371" text-anchor="middle">Sekventielt udforskende</text>
  <text class="t s" x="580" y="388" text-anchor="middle">Kvalitativt → kvantitativt</text>
  <text class="t si" x="580" y="403" text-anchor="middle">Saunders et al. (2023)</text>

  <!-- Row 2: Single-case / Tværsnit -->
  <rect class="box" x="150" y="424" width="200" height="60" rx="4" ry="4"/>
  <text class="t h" x="250" y="443" text-anchor="middle">Single-case studie</text>
  <text class="t s" x="250" y="460" text-anchor="middle">organisatorisk og funktionel afgrænsning</text>
  <text class="t si" x="250" y="475" text-anchor="middle">Holm (2023); Kuada (2012)</text>

  <rect class="box" x="370" y="424" width="200" height="60" rx="4" ry="4"/>
  <text class="t h" x="470" y="443" text-anchor="middle">Tværsnitsundersøgelse</text>
  <text class="t s" x="470" y="460" text-anchor="middle">forår 2026</text>
  <text class="t si" x="470" y="475" text-anchor="middle">Saunders et al. (2023)</text>

  <line class="sep" x1="20" y1="500" x2="700" y2="500"/>

  <!-- ===================== Niveau 4 ===================== -->
  <text class="t levellabel" x="30" y="518">NIVEAU 4 — METODE OG TEKNIK</text>

  <!-- Arrow from N3 down to N4 -->
  <line class="arrow" x1="360" y1="484" x2="360" y2="530"/>

  <rect class="box" x="170" y="530" width="380" height="50" rx="4" ry="4"/>
  <text class="t h" x="360" y="550" text-anchor="middle">Udforskende sekventiel triangulering</text>
  <text class="t si" x="360" y="567" text-anchor="middle">Kuada (2012, kap. 10) — analytisk funktion: formel vs. faktisk praksis</text>

  <!-- Split to two tracks -->
  <line class="arrow" x1="270" y1="580" x2="200" y2="604"/>
  <line class="arrow" x1="450" y1="580" x2="520" y2="604"/>

  <rect class="boxW" x="60" y="606" width="280" height="98" rx="4" ry="4"/>
  <text class="t h" x="200" y="625" text-anchor="middle">Kvalitativt spor (først)</text>
  <text class="t s" x="200" y="643" text-anchor="middle">Semistrukturerede interviews</text>
  <text class="t s" x="200" y="659" text-anchor="middle">Artefaktanalyse (SoluTalent)</text>
  <text class="t si" x="200" y="679" text-anchor="middle">Informant 1 (ledelse) &amp;</text>
  <text class="t si" x="200" y="693" text-anchor="middle">Informant 2 (teknisk ansvarlig)</text>

  <rect class="boxW" x="380" y="606" width="280" height="98" rx="4" ry="4"/>
  <text class="t h" x="520" y="625" text-anchor="middle">Kvantitativt spor (efter)</text>
  <text class="t s" x="520" y="643" text-anchor="middle">Systemudtræk og målepunkter</text>
  <text class="t s" x="520" y="659" text-anchor="middle">KPI'er (produktivitet, flow)</text>
  <text class="t s" x="520" y="675" text-anchor="middle">KQI'er (klienttilfredshed, CRM)</text>
  <text class="t si" x="520" y="693" text-anchor="middle">Procesdokumenter</text>

  <line class="sep" x1="20" y1="720" x2="700" y2="720"/>

  <!-- ===================== Kvalitetskriterier ===================== -->
  <text class="t levellabel" x="30" y="738">KVALITETSKRITERIER</text>

  <rect class="boxW" x="40" y="748" width="310" height="74" rx="4" ry="4"/>
  <text class="t h" x="195" y="767" text-anchor="middle">Kvalitativt spor</text>
  <text class="t s" x="195" y="785" text-anchor="middle">credibility · transferability</text>
  <text class="t s" x="195" y="800" text-anchor="middle">dependability · confirmability</text>
  <text class="t si" x="195" y="815" text-anchor="middle">Lincoln &amp; Guba via Kuada (2012)</text>

  <rect class="boxW" x="370" y="748" width="310" height="74" rx="4" ry="4"/>
  <text class="t h" x="525" y="767" text-anchor="middle">Kvantitativt spor</text>
  <text class="t s" x="525" y="785" text-anchor="middle">målepålidelighed · stabilitet</text>
  <text class="t s" x="525" y="800" text-anchor="middle">repræsentativitet</text>
  <text class="t si" x="525" y="815" text-anchor="middle">Saunders et al. (2023)</text>

  <!-- Bias -->
  <rect class="boxW" x="40" y="832" width="640" height="32" rx="4" ry="4"/>
  <text class="t s" x="360" y="852" text-anchor="middle">Bias-refleksion og insider-position: forfatter som udvikler af SoluTalent — transparens, triangulering og negative indikatorer på lige fod med positive</text>

  <!-- Caption -->
  <text class="t cap" x="360" y="882" text-anchor="middle">Figur 1. Egen figur. Baseret på Kuada (2012), Holm (2023), Saunders et al. (2023) og Rossman &amp; Wilson (1985).</text>
</svg>
